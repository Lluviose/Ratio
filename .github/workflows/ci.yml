name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      # e2e 只跑 chromium：mobile-safari 在 CI 容器上有页面节流相关的稳定性问题
      #（详见 TROUBLESHOOTING.md），本地/夜间再跑全矩阵
      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium

      - name: E2E (chromium)
        run: npx playwright test --project=chromium

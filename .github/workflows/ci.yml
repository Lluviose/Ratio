name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Dependency audit
        run: npm audit --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Server checks
        run: npm --prefix server run check

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Bundle budget checks
        run: npm run check:bundle

      # e2e 覆盖桌面与移动 Chromium；mobile-safari 在 CI 容器上有页面节流相关的稳定性问题
      #（详见 TROUBLESHOOTING.md），本地/夜间再跑 WebKit 全矩阵
      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium

      - name: E2E (chromium + mobile-chrome)
        run: npx playwright test --project=chromium --project=mobile-chrome

      # 失败时上传报告与 trace，避免 CI 独有失败只能靠本地节流复现排查
      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report/
            test-results/
          retention-days: 7
          if-no-files-found: ignore

services:
  ratio-server:
    build:
      context: ./server
    container_name: ratio-server
    restart: unless-stopped
    ports:
      - "${RATIO_SERVER_PORT:-8787}:8787"
    environment:
      PORT: 8787
      RATIO_DATA_DIR: /data
      RATIO_CORS_ORIGIN: ${RATIO_CORS_ORIGIN:-http://localhost:5173}
      RATIO_MAX_BACKUP_BYTES: ${RATIO_MAX_BACKUP_BYTES:-2097152}
      RATIO_REGISTRATION_INVITE_CODE: ${RATIO_REGISTRATION_INVITE_CODE:-}
      RATIO_ALLOW_OPEN_REGISTRATION: ${RATIO_ALLOW_OPEN_REGISTRATION:-false}
      RATIO_AI_CHAT_URL: ${RATIO_AI_CHAT_URL:-}
      RATIO_AI_BASE_URL: ${RATIO_AI_BASE_URL:-}
      RATIO_AI_CHAT_PATH: ${RATIO_AI_CHAT_PATH:-/v1/chat/completions}
      RATIO_AI_API_KEY: ${RATIO_AI_API_KEY:-}
      RATIO_AI_MODEL: ${RATIO_AI_MODEL:-gpt-5.2}
      RATIO_AI_REASONING_EFFORT: ${RATIO_AI_REASONING_EFFORT:-high}
      RATIO_AI_UPSTREAM_TIMEOUT_MS: ${RATIO_AI_UPSTREAM_TIMEOUT_MS:-120000}
      RATIO_AI_MAX_RESPONSE_BYTES: ${RATIO_AI_MAX_RESPONSE_BYTES:-2097152}
      RATIO_AI_RATE_LIMIT_PER_MINUTE: ${RATIO_AI_RATE_LIMIT_PER_MINUTE:-30}
      RATIO_AI_DAILY_REQUEST_LIMIT: ${RATIO_AI_DAILY_REQUEST_LIMIT:-200}
      RATIO_AI_MAX_MESSAGES: ${RATIO_AI_MAX_MESSAGES:-30}
      RATIO_AI_MAX_MESSAGE_CHARS: ${RATIO_AI_MAX_MESSAGE_CHARS:-12000}
      RATIO_AI_MAX_TOTAL_MESSAGE_CHARS: ${RATIO_AI_MAX_TOTAL_MESSAGE_CHARS:-60000}
      RATIO_AI_ALLOW_HTTP_UPSTREAM: ${RATIO_AI_ALLOW_HTTP_UPSTREAM:-false}
      RATIO_AI_ALLOW_PRIVATE_UPSTREAM: ${RATIO_AI_ALLOW_PRIVATE_UPSTREAM:-false}
      RATIO_TELEMETRY_MAX_DAILY_BYTES: ${RATIO_TELEMETRY_MAX_DAILY_BYTES:-5242880}
      RATIO_AUTH_RATE_LIMIT_PER_MINUTE: ${RATIO_AUTH_RATE_LIMIT_PER_MINUTE:-600}
      RATIO_REGISTER_RATE_LIMIT_PER_MINUTE: ${RATIO_REGISTER_RATE_LIMIT_PER_MINUTE:-30}
      RATIO_MAX_PASSWORD_CHARS: ${RATIO_MAX_PASSWORD_CHARS:-256}
      RATIO_ADMIN_USERNAME: ${RATIO_ADMIN_USERNAME:-}
      RATIO_ADMIN_PASSWORD: ${RATIO_ADMIN_PASSWORD:-}
      RATIO_ADMIN_RATE_LIMIT_PER_MINUTE: ${RATIO_ADMIN_RATE_LIMIT_PER_MINUTE:-300}
    volumes:
      - ratio-server-data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8787/api/health').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  ratio-server-data:

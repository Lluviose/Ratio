services:
  ratio-server:
    build:
      context: ./server
    container_name: ratio-server
    restart: unless-stopped
    ports:
      - "${RATIO_SERVER_PORT:-8787}:8787"
    environment:
      PORT: 8787
      RATIO_DATA_DIR: /data
      RATIO_CORS_ORIGIN: ${RATIO_CORS_ORIGIN:-*}
      RATIO_MAX_BACKUP_BYTES: ${RATIO_MAX_BACKUP_BYTES:-2097152}
      RATIO_REGISTRATION_INVITE_CODE: ${RATIO_REGISTRATION_INVITE_CODE:-}
      RATIO_AI_CHAT_URL: ${RATIO_AI_CHAT_URL:-}
      RATIO_AI_BASE_URL: ${RATIO_AI_BASE_URL:-}
      RATIO_AI_CHAT_PATH: ${RATIO_AI_CHAT_PATH:-/v1/chat/completions}
      RATIO_AI_API_KEY: ${RATIO_AI_API_KEY:-}
      RATIO_AI_MODEL: ${RATIO_AI_MODEL:-gpt-5.2}
      RATIO_AI_REASONING_EFFORT: ${RATIO_AI_REASONING_EFFORT:-high}
      RATIO_AI_UPSTREAM_TIMEOUT_MS: ${RATIO_AI_UPSTREAM_TIMEOUT_MS:-120000}
    volumes:
      - ratio-server-data:/data

volumes:
  ratio-server-data:

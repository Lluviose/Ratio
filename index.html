<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="pwa.svg" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" sizes="180x180" />
    <link rel="manifest" href="manifest.webmanifest" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' http://localhost:* http://127.0.0.1:* https:; object-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'" />
    <meta name="theme-color" content="#f2f4f7" />
    <script src="color-mode-boot.js"></script>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="ratio" />
    <meta name="application-name" content="ratio" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>ratio</title>
    <style>
      /* 启动骨架屏（P2-11）：React 挂载门控在 storageKernel.ready 上，WebKit
         IDB open 挂死时最坏 5s——此前是纯白屏。骨架内联在 index.html，脚本
         加载前就有内容；createRoot.render 会整体替换掉它。配色跟随
         color-mode-boot.js 写入的 html[data-mode]，与应用首帧一致。 */
      .bootShell {
        position: fixed;
        inset: 0;
        background: #f2f4f7;
        display: flex;
        flex-direction: column;
        gap: 14px;
        padding: 24px 20px;
        padding-top: max(56px, env(safe-area-inset-top));
      }
      html[data-mode='dark'] .bootShell {
        background: #0b101a;
      }
      .bootCard {
        border-radius: 22px;
        background: rgba(15, 23, 42, 0.06);
        animation: bootPulse 1.3s ease-in-out infinite;
      }
      html[data-mode='dark'] .bootCard {
        background: rgba(255, 255, 255, 0.06);
      }
      .bootCard:nth-child(1) { height: 40px; width: 55%; }
      .bootCard:nth-child(2) { height: 200px; animation-delay: 0.12s; }
      .bootCard:nth-child(3) { height: 88px; animation-delay: 0.24s; }
      .bootCard:nth-child(4) { height: 88px; animation-delay: 0.36s; }
      @keyframes bootPulse {
        0%, 100% { opacity: 0.55; }
        50% { opacity: 1; }
      }
      @media (prefers-reduced-motion: reduce) {
        .bootCard { animation: none; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="bootShell" aria-hidden="true">
        <div class="bootCard"></div>
        <div class="bootCard"></div>
        <div class="bootCard"></div>
        <div class="bootCard"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
